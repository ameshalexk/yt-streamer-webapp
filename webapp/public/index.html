<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0d10" />
  <title>YT Streamer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e10600'/><polygon points='40,30 72,50 40,70' fill='white'/></svg>" />
  <link rel="stylesheet" href="/styles.css?v=20260610-stream-seek" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand"><span class="dot"></span> YT Streamer</div>
      </div>
      <nav class="mode-tabs" aria-label="App mode">
        <button class="mode-tab active" type="button" data-mode="watch" aria-current="page">Watch</button>
        <button class="mode-tab" type="button" data-mode="browse">Browse</button>
        <button class="mode-tab" type="button" data-mode="saved">Saved</button>
        <button class="mode-tab" type="button" data-mode="library">Library</button>
      </nav>
      <div class="topbar-right">
        <div class="status" id="status">connecting…</div>
      </div>
    </header>

    <main class="layout mode-watch" id="layout">
      <aside class="saved-panel side-panel" id="playlistDrawer" aria-label="Saved channels" hidden>
        <div class="panel-head">
          <h2>Saved Channels</h2>
          <div class="panel-actions">
            <button class="btn small ghost" id="manageSavedBtn" type="button" aria-pressed="false">Manage</button>
            <button class="btn small manage-only" id="addPlaylistBtn">+ New</button>
          </div>
        </div>
        <div class="saved-columns">
          <section class="col playlists">
            <div class="col-head">
              <h2>Playlists</h2>
            </div>
            <ul class="list" id="playlistList"></ul>
          </section>

          <section class="col items">
            <div class="col-head">
              <h2 id="itemsTitle">Select a playlist</h2>
              <button class="btn small manage-only" id="addItemBtn" disabled>+ Add</button>
            </div>
            <ul class="list" id="itemList"></ul>
          </section>
        </div>
      </aside>

      <section class="col player">
        <div class="col-head">
          <h2 id="nowPlaying">Player</h2>
          <div class="player-actions">
            <button class="btn small ghost icon-only" id="fullscreenBtn" aria-label="Full screen" title="Full screen"><span class="fullscreen-icon" aria-hidden="true"></span></button>
            <button class="btn small ghost" id="muteBtn" title="Sound on/off">🔊</button>
            <button class="btn small ghost" id="restreamBtn" disabled title="Reload stream">↻ Restream</button>
            <button class="btn small ghost" id="stopBtn" disabled>■ Stop</button>
          </div>
        </div>

        <div class="screen" id="screen">
          <div class="stream-badge" id="streamBadge" hidden></div>
          <div class="stream-notice" id="streamNotice" hidden>
            <div class="notice-title" id="streamNoticeTitle"></div>
            <div class="notice-detail" id="streamNoticeDetail"></div>
            <div class="notice-actions">
              <button class="btn small secondary" id="streamRetryBtn" type="button">Retry</button>
              <button class="btn small ghost" id="streamLowerBtn" type="button">Lower quality</button>
            </div>
          </div>
          <video id="video" playsinline></video>
          <img id="mjpeg" alt="" />
          <audio id="audio" playsinline></audio>
          <div class="screen-empty" id="screenEmpty">
            <div class="big">▶</div>
            <p>Choose how to start watching</p>
            <div class="empty-actions">
              <button class="btn small secondary" type="button" id="emptySavedBtn">Saved Channels</button>
              <button class="btn small" type="button" id="emptyBrowseBtn">Browse Live Channels</button>
              <button class="btn small ghost" type="button" id="emptyPasteBtn">Paste URL</button>
            </div>
          </div>
        </div>

        <section class="stream-seek" id="streamSeek" aria-label="Stream seek controls" hidden>
          <div class="stream-seek-row">
            <button class="btn small ghost" id="streamBackBtn" type="button">-10s</button>
            <div class="stream-seek-track" id="streamSeekTrack" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
              <div class="stream-seek-fill" id="streamSeekFill"></div>
              <div class="stream-seek-thumb" id="streamSeekThumb"></div>
            </div>
            <button class="btn small ghost" id="streamForwardBtn" type="button">+10s</button>
          </div>
          <div class="stream-seek-time" id="streamSeekTime">0:00 / 0:00</div>
        </section>

        <div class="quick">
          <input id="quickUrl" type="text" inputmode="url" placeholder="Paste a channel URL, M3U playlist, or YouTube link…" />
          <button class="btn" id="quickPlayBtn">Go</button>
        </div>

        <section class="stream-settings" id="streamSettings">
          <button class="settings-toggle" id="streamSettingsBtn" type="button" aria-expanded="false" aria-controls="streamSettingsPanel">Stream settings</button>
          <div class="controls" id="streamSettingsPanel" hidden>
            <label>Resolution
              <select id="ctlHeight">
                <option value="240">240p</option>
                <option value="360">360p</option>
                <option value="480" selected>480p</option>
                <option value="720">720p</option>
                <option value="1080">1080p</option>
                <option value="0">Source</option>
              </select>
            </label>
            <label>FPS
              <select id="ctlFps" title="Higher FPS can stutter on Tesla/Cloudflare streams">
                <option value="5">5</option><option value="8">8</option><option value="12" selected>12</option><option value="15">15</option>
                <option class="risky" value="20">20 risky</option>
                <option class="risky" value="24">24 risky</option>
                <option class="risky" value="30">30 risky</option>
              </select>
              <div class="fps-presets" id="ctlFpsPresets" role="group" aria-label="FPS presets"></div>
            </label>
            <label>Quality
              <select id="ctlQuality" title="Lower = sharper but more bandwidth">
                <option value="4">High</option>
                <option value="7" selected>Medium</option>
                <option value="12">Low (4G)</option>
                <option value="18">Min</option>
              </select>
            </label>
            <span class="hint" id="bwHint"></span>
          </div>
        </section>
      </section>

      <section class="channels-view side-panel" id="channelsView" aria-label="Browse live channels" hidden>
        <div class="panel-head">
          <h2>Live Channels</h2>
        </div>
        <div class="save-feedback" id="chSaveFeedback" hidden>
          <span id="chSaveMessage"></span>
          <button class="btn small secondary" id="chOpenSaved" type="button">Open</button>
        </div>
        <div class="ch-filters">
          <div class="ch-menu" id="chSourceMenu">
            <button class="ch-menu-btn" id="chSourceBtn" type="button" aria-haspopup="listbox" aria-expanded="false">United States (US)</button>
            <div class="ch-menu-panel" id="chSourcePanel" role="listbox" hidden></div>
          </div>
          <input id="chSearch" type="text" inputmode="search" placeholder="Search channels…" />
          <div class="ch-menu group" id="chGroupMenu">
            <button class="ch-menu-btn" id="chGroupBtn" type="button" aria-haspopup="listbox" aria-expanded="false">All groups</button>
            <div class="ch-menu-panel" id="chGroupPanel" role="listbox" hidden></div>
          </div>
          <span class="ch-count" id="chCount"></span>
        </div>
        <div class="ch-list" id="chList"></div>
        <div class="ch-foot" id="chFoot" hidden>
          <button class="btn ghost" id="chMore">Load more</button>
        </div>
      </section>

      <section class="legacy-library side-panel" id="legacyLibraryView" aria-label="Processed YouTube library" hidden>
        <div class="panel-head">
          <h2>Processed Library</h2>
          <button class="btn small ghost" id="legacyRefreshBtn" type="button">Refresh</button>
        </div>
        <div class="legacy-body">
          <section class="legacy-download">
            <label for="legacyUrl">YouTube URL</label>
            <input id="legacyUrl" type="text" inputmode="url" placeholder="https://www.youtube.com/watch?v=…" />
            <div class="legacy-resolutions" id="legacyResolutions" aria-label="Download resolutions">
              <label><input type="checkbox" value="720" checked /> 720p</label>
              <label><input type="checkbox" value="480" checked /> 480p</label>
              <label><input type="checkbox" value="360" /> 360p</label>
              <label><input type="checkbox" value="240" /> 240p</label>
            </div>
            <div class="legacy-actions">
              <button class="btn small ghost" id="legacyProbeBtn" type="button">Check</button>
              <button class="btn small" id="legacyDownloadBtn" type="button">Download & Process</button>
            </div>
            <div class="legacy-progress" id="legacyProgress" hidden><i></i></div>
            <div class="legacy-status" id="legacyStatus"></div>
          </section>

          <section class="legacy-playlists">
            <div class="legacy-section-head">
              <h3>YouTube Playlists</h3>
              <div class="legacy-actions compact">
                <button class="btn small ghost" id="legacyAddPlaylistBtn" type="button">Add</button>
                <button class="btn small ghost" id="legacyDeletePlaylistBtn" type="button">Delete</button>
              </div>
            </div>
            <select id="legacyPlaylistSelect" aria-label="YouTube playlist"></select>
            <div class="legacy-playlist-videos" id="legacyPlaylistVideos">
              <div class="legacy-empty">Loading playlist...</div>
            </div>
          </section>

          <section class="legacy-player-controls" id="legacyControls">
            <div class="legacy-control-row">
              <select id="legacyResolutionSelect" aria-label="Playback resolution"></select>
              <button class="btn small ghost" id="legacyBackBtn" type="button" disabled>-5s</button>
              <button class="btn small ghost" id="legacyForwardBtn" type="button" disabled>+5s</button>
            </div>
            <div class="legacy-seek" id="legacySeek" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
              <div class="legacy-seek-fill" id="legacySeekFill"></div>
              <div class="legacy-seek-thumb" id="legacySeekThumb"></div>
            </div>
            <div class="legacy-time" id="legacyTime">0:00 / 0:00</div>
          </section>

          <div class="legacy-list" id="legacyList"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  <script src="/app.js?v=20260610-stream-seek"></script>
</body>
</html>
