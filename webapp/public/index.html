<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0d10" />
  <title>YT Streamer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e10600'/><polygon points='40,30 72,50 40,70' fill='white'/></svg>" />
  <link rel="stylesheet" href="/styles.css?v=20260609-playlist-tapfix" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="playlistMenuBtn" aria-label="Open playlists" aria-controls="playlistDrawer" aria-expanded="false" title="Playlists"><span class="hamburger-icon" aria-hidden="true"></span></button>
        <div class="brand"><span class="dot"></span> YT Streamer</div>
      </div>
      <div class="topbar-right">
        <button class="btn small" id="channelsBtn">📺 Channels</button>
        <div class="status" id="status">connecting…</div>
      </div>
    </header>

    <main class="layout">
      <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

      <aside class="playlist-drawer" id="playlistDrawer" aria-label="Playlist menu" aria-hidden="true">
        <div class="drawer-head">
          <h2>Playlist menu</h2>
          <button class="icon-btn" id="playlistCloseBtn" aria-label="Close playlists" title="Close"><span class="close-icon" aria-hidden="true"></span></button>
        </div>
        <div class="drawer-columns">
          <section class="col playlists">
            <div class="col-head">
              <h2>Playlists</h2>
              <button class="btn small" id="addPlaylistBtn">+ New</button>
            </div>
            <ul class="list" id="playlistList"></ul>
          </section>

          <section class="col items">
            <div class="col-head">
              <h2 id="itemsTitle">Select a playlist</h2>
              <button class="btn small" id="addItemBtn" disabled>+ Add</button>
            </div>
            <ul class="list" id="itemList"></ul>
          </section>
        </div>
      </aside>

      <section class="col player">
        <div class="col-head">
          <h2 id="nowPlaying">Player</h2>
          <div class="player-actions">
            <button class="btn small ghost icon-only" id="fullscreenBtn" aria-label="Full screen" title="Full screen"><span class="fullscreen-icon" aria-hidden="true"></span></button>
            <button class="btn small ghost" id="muteBtn" title="Sound on/off">🔊</button>
            <button class="btn small ghost" id="restreamBtn" disabled title="Reload stream">↻ Restream</button>
            <button class="btn small ghost" id="stopBtn" disabled>■ Stop</button>
          </div>
        </div>

        <div class="screen" id="screen">
          <div class="stream-badge" id="streamBadge" hidden></div>
          <div class="stream-notice" id="streamNotice" hidden>
            <div class="notice-title" id="streamNoticeTitle"></div>
            <div class="notice-detail" id="streamNoticeDetail"></div>
            <div class="notice-actions">
              <button class="btn small secondary" id="streamRetryBtn" type="button">Retry</button>
              <button class="btn small ghost" id="streamLowerBtn" type="button">Lower quality</button>
            </div>
          </div>
          <video id="video" playsinline></video>
          <img id="mjpeg" alt="" />
          <audio id="audio" playsinline></audio>
          <div class="screen-empty" id="screenEmpty">
            <div class="big">▶</div>
            <p>Tap any item to start streaming</p>
          </div>
        </div>

        <div class="quick">
          <input id="quickUrl" type="text" inputmode="url" placeholder="Paste a channel URL, M3U playlist, or YouTube link…" />
          <button class="btn" id="quickPlayBtn">Go</button>
        </div>

        <div class="controls">
          <label>Resolution
            <select id="ctlHeight">
              <option value="240">240p</option>
              <option value="360">360p</option>
              <option value="480" selected>480p</option>
              <option value="720">720p</option>
              <option value="1080">1080p</option>
              <option value="0">Source</option>
            </select>
          </label>
          <label>FPS
            <select id="ctlFps" title="Higher FPS can stutter on Tesla/Cloudflare streams">
              <option value="5">5</option><option value="8">8</option><option value="12" selected>12</option><option value="15">15</option>
              <option class="risky" value="20">20 risky</option>
              <option class="risky" value="24">24 risky</option>
              <option class="risky" value="30">30 risky</option>
            </select>
            <div class="fps-presets" id="ctlFpsPresets" role="group" aria-label="FPS presets"></div>
          </label>
          <label>Quality
            <select id="ctlQuality" title="Lower = sharper but more bandwidth">
              <option value="4">High</option>
              <option value="7" selected>Medium</option>
              <option value="12">Low (4G)</option>
              <option value="18">Min</option>
            </select>
          </label>
          <span class="hint" id="bwHint"></span>
        </div>

        <!-- Channels browser (inline home panel) -->
        <div class="channels-view" id="channelsView" hidden>
          <div class="ch-head">
            <h2>📺 Live Channels</h2>
            <button class="btn small ghost" id="chClose">Hide</button>
          </div>
          <div class="ch-filters">
            <div class="ch-menu" id="chSourceMenu">
              <button class="ch-menu-btn" id="chSourceBtn" type="button" aria-haspopup="listbox" aria-expanded="false">United States (US)</button>
              <div class="ch-menu-panel" id="chSourcePanel" role="listbox" hidden></div>
            </div>
            <input id="chSearch" type="text" inputmode="search" placeholder="Search channels…" />
            <div class="ch-menu group" id="chGroupMenu">
              <button class="ch-menu-btn" id="chGroupBtn" type="button" aria-haspopup="listbox" aria-expanded="false">All groups</button>
              <div class="ch-menu-panel" id="chGroupPanel" role="listbox" hidden></div>
            </div>
            <span class="ch-count" id="chCount"></span>
          </div>
          <div class="ch-list" id="chList"></div>
          <div class="ch-foot" id="chFoot" hidden>
            <button class="btn ghost" id="chMore">Load more</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  <script src="/app.js?v=20260609-playlist-tapfix"></script>
</body>
</html>
